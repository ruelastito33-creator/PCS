services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: pcs
      POSTGRES_PASSWORD: pcs_local
      POSTGRES_DB: pcs
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6381:6379"

volumes:
  pgdata:
